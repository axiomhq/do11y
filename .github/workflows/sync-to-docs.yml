name: Sync do11y.js to docs repo

# Automatically opens a PR in your docs repo when a new release is published.
#
# Required setup (Settings > Secrets and variables > Actions):
#
#   Secrets:
#     DOCS_REPO_TOKEN  - A GitHub PAT with contents:write and pull_requests:write
#                        on the target docs repo.
#
#   Variables:
#     DOCS_REPO        - Target repo in owner/name format (e.g. axiomhq/docs).
#     DOCS_DEST_PATH   - Destination path for do11y.js in the target repo
#                        (e.g. styles/do11y.js).

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do11y
        uses: actions/checkout@v4

      - name: Checkout docs
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DOCS_REPO }}
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: _docs

      - name: Copy do11y.js
        run: cp dist/do11y.js "_docs/${{ vars.DOCS_DEST_PATH }}"

      - name: Check for changes
        id: diff
        working-directory: _docs
        run: |
          git diff --quiet "${{ vars.DOCS_DEST_PATH }}" && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        working-directory: _docs
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          BRANCH="do11y/${VERSION}"
          REPO="${{ github.repository }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "${{ vars.DOCS_DEST_PATH }}"
          git commit -m "Update do11y.js to ${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "Update do11y.js to ${VERSION}" \
            --body "$(cat <<EOF
          Automated PR from [do11y ${VERSION}](https://github.com/${REPO}/releases/tag/${VERSION}).

          This PR was created by the [sync-to-docs](https://github.com/${REPO}/actions/workflows/sync-to-docs.yml) workflow.
          EOF
          )"
