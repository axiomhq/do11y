name: Integration tests

# Runs the full integration test suite on every PR commit.
#
# Required setup (Settings > Secrets and variables > Actions > Secrets):
#
#   AXIOM_TOKEN    — API token with ingest + query permissions.
#   AXIOM_DOMAIN   — Axiom domain.
#   AXIOM_DATASET  — Dataset to use for test events.

on:
  pull_request:
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install mkdocs-material
        working-directory: tests/sites/mkdocs-material

      - name: Install test runner dependencies
        run: npm install
        working-directory: tests

      - name: Run integration tests
        run: npm run test-integrations
        working-directory: tests
        env:
          AXIOM_DOMAIN: ${{ secrets.AXIOM_DOMAIN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          AXIOM_DATASET: ${{ secrets.AXIOM_DATASET }}
