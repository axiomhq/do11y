<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Do11y Framework Selector Tests</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; padding: 2rem; background: #f9fafb; color: #111; }
    h1 { margin-bottom: 1.5rem; }
    .suite { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 1.5rem; background: #fff; overflow: hidden; }
    .suite-header { padding: 0.75rem 1rem; font-weight: 600; font-size: 1rem; border-bottom: 1px solid #e5e7eb; background: #f3f4f6; }
    .result { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1rem; font-size: 0.875rem; font-family: monospace; border-bottom: 1px solid #f3f4f6; }
    .result:last-child { border-bottom: none; }
    .pass { color: #059669; }
    .fail { color: #dc2626; }
    .badge { display: inline-block; width: 18px; text-align: center; }
    #sandbox { position: absolute; left: -9999px; top: -9999px; }
    #summary { margin-bottom: 1.5rem; padding: 1rem; border-radius: 8px; font-weight: 600; font-size: 1.1rem; }
    #summary.all-pass { background: #d1fae5; color: #065f46; }
    #summary.has-fail { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>Do11y Framework Selector Tests</h1>
  <div id="summary"></div>
  <div id="results"></div>
  <div id="sandbox"></div>

  <script>
    // ---------------------------------------------------------------
    // Extract FRAMEWORK_PRESETS and applyFrameworkSelectors from do11y
    // by re-declaring them here for isolated testing.
    // ---------------------------------------------------------------

    const FRAMEWORK_PRESETS = {
      mintlify: {
        searchSelector: '#search-bar-entry, #search-bar-entry-mobile, [class*="search"]',
        copyButtonSelector: '[class*="copy"], button[aria-label*="copy" i]',
        codeBlockSelector: 'pre, [class*="code"]',
        navigationSelector: 'nav, [role="navigation"], #navbar, #sidebar, [class*="nav"], [class*="sidebar"]',
        footerSelector: 'footer, [role="contentinfo"], [class*="footer"]',
        contentSelector: 'main, article, [role="main"], [class*="content"]',
      },
      docusaurus: {
        searchSelector: '.DocSearch, .DocSearch-Button',
        copyButtonSelector: 'button.clean-btn[aria-label*="copy" i], button[class*="copyButton"]',
        codeBlockSelector: 'pre, [class*="code"]',
        navigationSelector: 'nav, [role="navigation"], .navbar, .sidebar, [class*="nav"], [class*="sidebar"]',
        footerSelector: 'footer, [role="contentinfo"], [class*="footer"]',
        contentSelector: 'main, article, [role="main"], [class*="content"]',
      },
      nextra: {
        searchSelector: '.nextra-search input, input[placeholder*="search" i], button[aria-label*="search" i]',
        copyButtonSelector: 'button[class*="copy"], button[aria-label*="copy" i], button[title*="copy" i]',
        codeBlockSelector: 'pre, [class*="code"]',
        navigationSelector: 'nav, [role="navigation"], [class*="nav"], [class*="sidebar"]',
        footerSelector: 'footer, [role="contentinfo"], [class*="footer"]',
        contentSelector: 'main, article, [role="main"], [class*="content"]',
      },
      gitbook: {
        searchSelector: '[data-testid*="search"], button[aria-label*="search" i]',
        copyButtonSelector: '[class*="copy"], button[aria-label*="copy" i]',
        codeBlockSelector: 'pre, code, [class*="code"]',
        navigationSelector: 'nav, [role="navigation"], [class*="nav"], [class*="sidebar"]',
        footerSelector: 'footer, [role="contentinfo"], [class*="footer"]',
        contentSelector: 'main, article, [role="main"], [class*="content"]',
      },
      'mkdocs-material': {
        searchSelector: '.md-search__input',
        copyButtonSelector: '.md-clipboard, .md-code__button[title="Copy to clipboard"]',
        codeBlockSelector: 'pre, code, [class*="code"]',
        navigationSelector: 'nav, [role="navigation"], .md-nav, .md-sidebar',
        footerSelector: 'footer, [role="contentinfo"], .md-footer',
        contentSelector: 'main, article, [role="main"], .md-content',
      },
      vitepress: {
        searchSelector: '.VPNavBarSearch button, .VPNavBarSearchButton, #local-search',
        copyButtonSelector: '.vp-code-copy, button.copy[title*="Copy"]',
        codeBlockSelector: 'pre, [class*="code"]',
        navigationSelector: 'nav, [role="navigation"], .VPNav, .VPSidebar, [class*="nav"], [class*="sidebar"]',
        footerSelector: 'footer, [role="contentinfo"], .VPFooter, [class*="footer"]',
        contentSelector: 'main, article, [role="main"], .VPContent, [class*="content"]',
      },
    };

    const SELECTOR_KEYS = [
      'searchSelector', 'copyButtonSelector', 'codeBlockSelector',
      'navigationSelector', 'footerSelector', 'contentSelector',
    ];

    function applyFrameworkSelectors(config) {
      const preset = FRAMEWORK_PRESETS[config.framework];
      if (preset) {
        SELECTOR_KEYS.forEach(function(key) {
          config[key] = config[key] || preset[key];
        });
      }
      const fallback = FRAMEWORK_PRESETS.mintlify;
      SELECTOR_KEYS.forEach(function(key) {
        if (!config[key]) config[key] = fallback[key];
      });
      return config;
    }

    // ---------------------------------------------------------------
    // Mock DOM fragments that mimic each framework's real HTML output
    // ---------------------------------------------------------------

    const FRAMEWORK_MOCKS = {
      mintlify: `
        <div id="search-bar-entry">Search</div>
        <div id="search-bar-entry-mobile">Search mobile</div>
        <button class="copy-button" aria-label="Copy code">Copy</button>
        <pre><code>console.log('hello')</code></pre>
        <nav><a href="/">Home</a></nav>
        <div id="sidebar"><a href="/guide">Guide</a></div>
        <footer><span>Footer</span></footer>
        <main><article><p>Content</p></article></main>
      `,
      docusaurus: `
        <button class="DocSearch DocSearch-Button">Search</button>
        <button class="clean-btn" aria-label="Copy code to clipboard">Copy</button>
        <pre class="prism-code"><code>const x = 1;</code></pre>
        <nav class="navbar"><a href="/">Home</a></nav>
        <div class="sidebar"><a href="/guide">Guide</a></div>
        <footer class="footer"><span>Footer</span></footer>
        <main><article><p>Content</p></article></main>
      `,
      nextra: `
        <div class="nextra-search"><input type="text" placeholder="Search documentation…" /></div>
        <button class="copy-btn" title="Copy code">Copy</button>
        <pre><code>import next from 'next'</code></pre>
        <nav class="nextra-nav"><a href="/">Home</a></nav>
        <aside class="nextra-sidebar"><a href="/guide">Guide</a></aside>
        <footer class="nextra-footer"><span>Footer</span></footer>
        <main><article class="nextra-content"><p>Content</p></article></main>
      `,
      gitbook: `
        <input data-testid="search-input" placeholder="Search" />
        <button class="copy-code" aria-label="Copy to clipboard">Copy</button>
        <pre><code>print('hello')</code></pre>
        <nav><a href="/">Home</a></nav>
        <aside class="gitbook-sidebar"><a href="/guide">Guide</a></aside>
        <footer><span>Footer</span></footer>
        <main><article><p>Content</p></article></main>
      `,
      'mkdocs-material': `
        <input class="md-search__input" placeholder="Search" />
        <button class="md-code__button" title="Copy to clipboard">Copy</button>
        <pre><code class="language-python">print('hello')</code></pre>
        <nav class="md-nav"><a href="/">Home</a></nav>
        <div class="md-sidebar"><a href="/guide">Guide</a></div>
        <footer class="md-footer"><span>Footer</span></footer>
        <main class="md-content"><article><p>Content</p></article></main>
      `,
      vitepress: `
        <div class="VPNavBarSearch"><button class="VPNavBarSearchButton">Search</button></div>
        <button class="copy" title="Copy code">Copy</button>
        <pre class="vp-code"><code>const vp = true;</code></pre>
        <div class="VPNav"><nav><a href="/">Home</a></nav></div>
        <div class="VPSidebar"><a href="/guide">Guide</a></div>
        <footer class="VPFooter"><span>Footer</span></footer>
        <main class="VPContent"><article><p>Content</p></article></main>
      `,
    };

    // ---------------------------------------------------------------
    // Test runner
    // ---------------------------------------------------------------

    const sandbox = document.getElementById('sandbox');
    const resultsEl = document.getElementById('results');
    const summaryEl = document.getElementById('summary');
    let totalPass = 0;
    let totalFail = 0;

    function runSuite(frameworkName, html, resolvedConfig) {
      sandbox.innerHTML = html;

      const suiteEl = document.createElement('div');
      suiteEl.className = 'suite';
      const header = document.createElement('div');
      header.className = 'suite-header';
      header.textContent = frameworkName;
      suiteEl.appendChild(header);

      SELECTOR_KEYS.forEach(function(key) {
        const selector = resolvedConfig[key];
        let matched = false;
        try {
          matched = sandbox.querySelector(selector) !== null;
        } catch (e) {
          matched = false;
        }

        const row = document.createElement('div');
        row.className = 'result ' + (matched ? 'pass' : 'fail');
        const badge = matched ? '✓' : '✗';
        row.innerHTML =
          '<span class="badge">' + badge + '</span>' +
          '<span>' + key + '</span>' +
          '<span style="color:#6b7280;margin-left:auto;max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
            selector +
          '</span>';
        suiteEl.appendChild(row);

        if (matched) totalPass++;
        else totalFail++;
      });

      resultsEl.appendChild(suiteEl);
      sandbox.innerHTML = '';
    }

    // --- Run each named framework ---
    Object.keys(FRAMEWORK_PRESETS).forEach(function(name) {
      const config = applyFrameworkSelectors({ framework: name });
      runSuite(name, FRAMEWORK_MOCKS[name], config);
    });

    // --- Test: custom framework with partial selectors ---
    (function() {
      const config = applyFrameworkSelectors({
        framework: 'custom',
        searchSelector: '.my-custom-search',
        copyButtonSelector: null,
        codeBlockSelector: null,
        navigationSelector: null,
        footerSelector: null,
        contentSelector: null,
      });

      const html = `
        <div class="my-custom-search">Search</div>
        <button class="copy-button" aria-label="Copy code">Copy</button>
        <pre><code>x = 1</code></pre>
        <nav><a href="/">Home</a></nav>
        <footer><span>Footer</span></footer>
        <main><p>Content</p></main>
      `;

      runSuite('custom (partial overrides, rest falls back to mintlify)', html, config);
    })();

    // --- Test: unknown framework falls back to mintlify ---
    (function() {
      const config = applyFrameworkSelectors({ framework: 'unknown-ssg' });

      runSuite(
        'unknown framework (should fall back to mintlify selectors)',
        FRAMEWORK_MOCKS.mintlify,
        config
      );
    })();

    // --- Summary ---
    summaryEl.textContent = totalPass + ' passed, ' + totalFail + ' failed';
    summaryEl.className = totalFail === 0 ? 'all-pass' : 'has-fail';
  </script>
</body>
</html>
